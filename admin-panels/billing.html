<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>BlinkOne — Billing</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
<script src="./_app.js"></script>
</head>
<body class="bg-slate-900 text-slate-200 p-5" x-data="panel()" x-init="init()">
<div class="max-w-4xl mx-auto">
  <h1 class="text-lg font-semibold mb-5">💳 Billing &amp; Plans</h1>
  <div x-show="err" x-text="err" class="mb-3 p-3 bg-red-900/50 border border-red-700 rounded text-sm text-red-300"></div>
  <section class="mb-6">
    <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wide mb-3">Plans</h2>
    <div class="grid grid-cols-3 gap-3">
      <template x-for="p in plans" :key="p.id">
        <div class="bg-slate-800 border border-slate-700 rounded-lg p-4">
          <div class="font-semibold" x-text="p.name"></div>
          <div class="text-slate-400 text-sm mt-1" x-text="p.description"></div>
          <div class="text-blue-400 font-bold mt-2" x-text="`${p.priceMonthly} ${p.currency}/mo`"></div>
          <div class="text-slate-500 text-xs mt-1" x-text="`${p.includedAgents} agents`"></div>
        </div>
      </template>
    </div>
  </section>
  <section class="mb-6">
    <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wide mb-3">Pending Signups</h2>
    <div x-show="signups.filter(s=>s.status==='pending').length===0" class="text-slate-500 text-sm">No pending signups.</div>
    <div class="space-y-2">
      <template x-for="s in signups.filter(x=>x.status==='pending')" :key="s.id">
        <div class="bg-slate-800 border border-slate-700 rounded-lg p-4 flex items-center justify-between">
          <div>
            <div class="font-medium" x-text="s.orgName"></div>
            <div class="text-sm text-slate-400" x-text="`${s.email} · ${s.planId}`"></div>
            <div class="text-xs text-slate-500" x-text="bo.fmt(s.requestedAt)"></div>
          </div>
          <button @click="approve(s.id)" class="bg-green-700 hover:bg-green-600 px-3 py-1 rounded text-sm">Approve</button>
        </div>
      </template>
    </div>
  </section>
  <section>
    <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wide mb-3">Active Subscriptions</h2>
    <div x-show="subs.length===0" class="text-slate-500 text-sm">No subscriptions.</div>
    <div class="space-y-2">
      <template x-for="s in subs" :key="s.id">
        <div class="bg-slate-800 border border-slate-700 rounded-lg p-3 flex items-center justify-between">
          <div>
            <span class="font-medium" x-text="`Tenant #${s.tenantId} — ${s.planId}`"></span>
            <span class="text-slate-400 text-sm ml-2" x-text="`· ${s.currency}`"></span>
          </div>
          <span class="px-2 py-0.5 rounded text-xs bg-green-900 text-green-300" x-text="s.status"></span>
        </div>
      </template>
    </div>
  </section>
</div>
<script>
function panel() {
  return { plans:[], subs:[], signups:[], err:null,
    async init() {
      try {
        [this.plans, this.subs, this.signups] = await Promise.all([bo.get('/billing/v1/plans'), bo.get('/billing/v1/subscriptions'), bo.get('/billing/v1/signups')]);
      } catch(e) { this.err=e.message; }
    },
    async approve(id) {
      try { await bo.patch(`/billing/v1/signups/${id}/approve`, {}); await this.init(); }
      catch(e) { this.err=e.message; }
    }
  };
}
</script>
</body></html>
