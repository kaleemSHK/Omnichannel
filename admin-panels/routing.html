<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BlinkOne — Routing</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
  <script src="./_app.js"></script>
</head>
<body class="bg-slate-900 text-slate-200 p-5" x-data="panel()" x-init="init()">
<div class="max-w-5xl mx-auto">
  <div class="flex flex-wrap items-center justify-between gap-3 mb-5">
    <h1 class="text-lg font-semibold">🔀 Call Routing (ACD)</h1>
    <div class="flex flex-wrap gap-2 items-center">
      <input x-model="tenantId" type="text" placeholder="Tenant" class="bg-slate-800 border border-slate-600 rounded px-3 py-1.5 text-sm w-28">
      <input x-model="bo.token" @change="bo.setToken(bo.token)" type="password" placeholder="ROUTING_TOKEN" class="bg-slate-800 border border-slate-600 rounded px-3 py-1.5 text-sm w-40">
      <button @click="load()" class="bg-blue-600 hover:bg-blue-700 px-4 py-1.5 rounded text-sm">Refresh</button>
    </div>
  </div>

  <div x-show="msg" class="mb-3 p-3 bg-green-900/40 border border-green-700 rounded text-sm text-green-200" x-text="msg"></div>
  <div x-show="err" x-text="err" class="mb-3 p-3 bg-red-900/50 border border-red-700 rounded text-sm text-red-300"></div>

  <div class="grid grid-cols-3 gap-3 mb-6">
    <div class="bg-slate-800 border border-slate-700 rounded-lg p-4 text-center">
      <div class="text-2xl font-bold text-green-400" x-text="agents.filter(a=>a.status==='available').length"></div>
      <div class="text-sm text-slate-400">Available</div>
    </div>
    <div class="bg-slate-800 border border-slate-700 rounded-lg p-4 text-center">
      <div class="text-2xl font-bold text-blue-400" x-text="agents.filter(a=>a.status==='busy').length"></div>
      <div class="text-sm text-slate-400">Busy</div>
    </div>
    <div class="bg-slate-800 border border-slate-700 rounded-lg p-4 text-center">
      <div class="text-2xl font-bold text-yellow-400" x-text="totalWaiting"></div>
      <div class="text-sm text-slate-400">Calls waiting</div>
    </div>
  </div>

  <section class="mb-8">
    <div class="flex justify-between items-center mb-3">
      <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-wide">Queues</h2>
    </div>
    <div class="space-y-2 mb-3">
      <template x-for="q in queues" :key="q.id">
        <div class="bg-slate-800 border border-slate-700 rounded-lg p-3 flex justify-between items-center">
          <div>
            <div class="font-medium" x-text="q.name"></div>
            <div class="text-xs text-slate-400">
              <span x-text="`key: ${q.queueKey}`"></span>
              <span class="ml-2" x-text="`algo: ${q.selectionAlgorithm}`"></span>
              <span class="ml-2" x-text="`skills: ${(q.skills||[]).map(s=>s.skill).join(', ')||'—'}`"></span>
            </div>
          </div>
          <div class="text-xs text-slate-500" x-text="`waiting: ${q._waiting ?? '…'}`"></div>
        </div>
      </template>
    </div>
    <div class="bg-slate-800 border border-slate-700 rounded-lg p-4 grid sm:grid-cols-3 gap-2">
      <input x-model="newQueue.key" placeholder="queue key" class="bg-slate-900 border border-slate-600 rounded px-3 py-2 text-sm">
      <input x-model="newQueue.name" placeholder="display name" class="bg-slate-900 border border-slate-600 rounded px-3 py-2 text-sm">
      <input x-model="newQueue.skills" placeholder="skills (comma)" class="bg-slate-900 border border-slate-600 rounded px-3 py-2 text-sm">
      <button @click="createQueue()" class="sm:col-span-3 bg-blue-600 hover:bg-blue-700 rounded py-2 text-sm">Add queue</button>
    </div>
  </section>

  <section>
    <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-3">Agents</h2>
    <div class="bg-slate-800 border border-slate-700 rounded-lg p-4 grid sm:grid-cols-4 gap-2 mb-4">
      <input x-model="newAgent.id" placeholder="agent id" class="bg-slate-900 border border-slate-600 rounded px-3 py-2 text-sm">
      <input x-model="newAgent.skills" placeholder="skills" class="bg-slate-900 border border-slate-600 rounded px-3 py-2 text-sm">
      <select x-model="newAgent.status" class="bg-slate-900 border border-slate-600 rounded px-3 py-2 text-sm">
        <option value="available">available</option>
        <option value="busy">busy</option>
        <option value="away">away</option>
        <option value="offline">offline</option>
      </select>
      <button @click="registerAgent()" class="bg-blue-600 hover:bg-blue-700 rounded py-2 text-sm">Register / set state</button>
    </div>
    <div class="space-y-2">
      <template x-for="a in agents" :key="`${a.tenantId}:${a.agentId}`">
        <div class="bg-slate-800 border border-slate-700 rounded-lg p-3 flex items-center justify-between">
          <div>
            <div class="font-medium" x-text="a.agentId"></div>
            <div class="text-xs text-slate-400" x-text="`Skills: ${(a.skills||[]).join(', ')||'—'} · Queues: ${(a.queueKeys||[]).join(', ')||'—'}`"></div>
          </div>
          <span class="px-2 py-0.5 rounded text-xs"
            :class="{'bg-green-900 text-green-300':a.status==='available','bg-blue-900 text-blue-300':a.status==='busy','bg-slate-700 text-slate-400':a.status==='away'||a.status==='offline'}"
            x-text="a.status"></span>
        </div>
      </template>
      <div x-show="!agents.length" class="text-slate-500 text-sm">No agents registered.</div>
    </div>
  </section>
</div>

<script>
function panel() {
  return {
    tenantId: 'default',
    agents: [],
    queues: [],
    totalWaiting: 0,
    err: null,
    msg: null,
    newQueue: { key: '', name: '', skills: '' },
    newAgent: { id: '1000', skills: 'sales,support', status: 'available' },
    qs() { return `?tenant_id=${encodeURIComponent(this.tenantId)}`; },
    async init() {
      this.tenantId = new URLSearchParams(location.search).get('tenant_id') || 'default';
      if (!bo.token) bo.token = 'routing-api-token';
      await this.load();
    },
    async load() {
      this.err = this.msg = null;
      try {
        const [agents, queues] = await Promise.all([
          bo.get(`/routing/v1/agents${this.qs()}`),
          bo.get(`/routing/v1/queues${this.qs()}`),
        ]);
        this.agents = agents;
        let wait = 0;
        for (const q of queues) {
          try {
            const st = await bo.get(`/routing/v1/queues/${q.id}/stats${this.qs()}`);
            q._waiting = st.waiting ?? 0;
            wait += q._waiting;
          } catch { q._waiting = 0; }
        }
        this.queues = queues;
        this.totalWaiting = wait;
      } catch (e) { this.err = e.message; }
    },
    async createQueue() {
      this.err = this.msg = null;
      try {
        const skills = this.newQueue.skills.split(',').map(s => s.trim()).filter(Boolean).map(s => ({ skill: s }));
        await bo.post(`/routing/v1/queues${this.qs()}`, {
          queueKey: this.newQueue.key,
          name: this.newQueue.name || this.newQueue.key,
          skills,
        });
        this.msg = 'Queue created';
        this.newQueue = { key: '', name: '', skills: '' };
        await this.load();
      } catch (e) { this.err = e.message; }
    },
    async registerAgent() {
      this.err = this.msg = null;
      try {
        const skills = this.newAgent.skills.split(',').map(s => s.trim()).filter(Boolean);
        await bo.post(`/routing/v1/agents${this.qs()}`, {
          agentId: this.newAgent.id,
          skills,
          queueKeys: ['sales', 'support', 'default'],
          status: this.newAgent.status,
        });
        await bo.post(`/routing/v1/agents/${this.newAgent.id}/state${this.qs()}`, {
          status: this.newAgent.status,
          skills,
        });
        this.msg = 'Agent registered';
        await this.load();
      } catch (e) { this.err = e.message; }
    },
  };
}
</script>
</body>
</html>
