<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>BlinkOne — IVR</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
<script src="./_app.js"></script>
</head>
<body class="bg-slate-900 text-slate-200 p-5" x-data="panel()" x-init="init()">
<div class="max-w-4xl mx-auto">
  <h1 class="text-lg font-semibold mb-5">📞 IVR Flows</h1>
  <div x-show="err" x-text="err" class="mb-3 p-3 bg-red-900/50 border border-red-700 rounded text-sm text-red-300"></div>
  <div class="space-y-4">
    <template x-for="f in flows" :key="f.id">
      <div class="bg-slate-800 border border-slate-700 rounded-lg p-4">
        <div class="flex items-center justify-between mb-2">
          <div class="font-semibold" x-text="`Flow #${f.id}: ${f.name}`"></div>
          <span class="text-xs text-slate-400" x-text="`${f.graph?.nodes?.length||0} nodes · Entry: ${f.graph?.entry}`"></span>
        </div>
        <div class="flex flex-wrap gap-2">
          <template x-for="n in f.graph?.nodes||[]" :key="n.id">
            <div class="px-2 py-1 text-xs rounded border" :class="n.id===f.graph?.entry?'border-blue-500 text-blue-300':'border-slate-600 text-slate-400'">
              <span x-text="n.id"></span><span class="ml-1 text-slate-500" x-text="`[${n.type}]`"></span>
              <span x-show="n.digit" class="ml-1 text-yellow-400" x-text="`→${n.digit}`"></span>
            </div>
          </template>
        </div>
        <div class="text-xs text-slate-500 mt-2" x-text="`Updated: ${bo.fmt(f.updatedAt)}`"></div>
      </div>
    </template>
    <div x-show="!flows.length" class="text-slate-500 text-sm">No flows.</div>
  </div>
</div>
<script>
function panel() {
  return { flows:[], err:null,
    async init() {
      try { this.flows = await bo.get('/ivr/v1/flows'); }
      catch(e) { this.err=e.message; }
    }
  };
}
</script>
</body></html>
