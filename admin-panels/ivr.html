<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BlinkOne — IVR Flows</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
  <script src="./_app.js"></script>
</head>
<body class="bg-slate-900 text-slate-200 p-5" x-data="panel()" x-init="init()">
<div class="max-w-5xl mx-auto">
  <div class="flex flex-wrap items-center justify-between gap-3 mb-5">
    <h1 class="text-lg font-semibold">📞 IVR Flows</h1>
    <div class="flex flex-wrap items-center gap-2">
      <input x-model="tenantId" type="text" placeholder="Tenant ID" class="bg-slate-800 border border-slate-600 rounded px-3 py-1.5 text-sm w-36">
      <input x-model="bo.token" @change="bo.setToken(bo.token)" type="password" placeholder="API token (IVR_TOKEN)" class="bg-slate-800 border border-slate-600 rounded px-3 py-1.5 text-sm w-48">
      <button @click="load()" class="bg-blue-600 hover:bg-blue-700 px-4 py-1.5 rounded text-sm">Refresh</button>
    </div>
  </div>

  <div x-show="msg" class="mb-3 p-3 bg-green-900/40 border border-green-700 rounded text-sm text-green-200" x-text="msg"></div>
  <div x-show="err" x-text="err" class="mb-3 p-3 bg-red-900/50 border border-red-700 rounded text-sm text-red-300"></div>

  <div class="grid lg:grid-cols-3 gap-4">
    <section class="lg:col-span-1 space-y-2">
      <div class="flex justify-between items-center mb-2">
        <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-wide">Flows</h2>
        <button @click="newFlow()" class="text-xs text-blue-400 hover:text-blue-300">+ New</button>
      </div>
      <template x-for="f in flows" :key="f.id">
        <button @click="select(f)" class="w-full text-left bg-slate-800 border rounded-lg p-3 transition"
          :class="selected?.id===f.id?'border-blue-500':'border-slate-700 hover:border-slate-500'">
          <div class="font-medium text-sm" x-text="f.name"></div>
          <div class="text-xs text-slate-400 mt-1">
            <span x-text="`v${f.activeVersion ?? '?'}`"></span>
            <span x-show="f.isDefault" class="ml-2 text-yellow-400">default</span>
          </div>
        </button>
      </template>
      <div x-show="!flows.length && loaded" class="text-slate-500 text-sm">No flows for this tenant.</div>
    </section>

    <section class="lg:col-span-2" x-show="selected">
      <div class="bg-slate-800 border border-slate-700 rounded-lg p-4 mb-4">
        <label class="text-xs text-slate-400 block mb-1">Flow name</label>
        <input x-model="editName" class="w-full bg-slate-900 border border-slate-600 rounded px-3 py-2 text-sm mb-3">
        <label class="flex items-center gap-2 text-sm mb-3">
          <input type="checkbox" x-model="editDefault" class="rounded">
          <span>Default flow for tenant</span>
        </label>
        <button @click="saveMeta()" class="bg-slate-600 hover:bg-slate-500 px-3 py-1.5 rounded text-sm mr-2">Save metadata</button>
        <span class="text-xs text-slate-500" x-text="`ID: ${selected?.id}`"></span>
      </div>

      <div class="mb-2 flex justify-between items-center">
        <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-wide">Graph (JSON)</h2>
        <button @click="publish()" class="bg-blue-600 hover:bg-blue-700 px-4 py-1.5 rounded text-sm">Publish new version</button>
      </div>
      <textarea x-model="graphJson" rows="16" class="w-full font-mono text-xs bg-slate-950 border border-slate-600 rounded p-3 mb-3"></textarea>
      <input x-model="versionComment" placeholder="Version comment (optional)" class="w-full bg-slate-800 border border-slate-600 rounded px-3 py-2 text-sm mb-4">

      <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-2">Version history</h2>
      <div class="space-y-2 max-h-48 overflow-y-auto">
        <template x-for="v in versions" :key="v.id || v.version">
          <div class="flex items-center justify-between bg-slate-800 border border-slate-700 rounded p-2 text-sm">
            <span>
              <span class="font-mono" x-text="`v${v.version}`"></span>
              <span class="text-slate-500 ml-2" x-text="bo.fmt(v.createdAt)"></span>
              <span x-show="v.comment" class="text-slate-400 ml-2" x-text="v.comment"></span>
            </span>
            <button @click="activate(v)" class="text-xs text-blue-400" x-show="selected?.activeVersionId !== v.id && selected?.activeVersion !== v.version">Activate</button>
            <span x-show="selected?.activeVersionId === v.id || selected?.activeVersion === v.version" class="text-xs text-green-400">active</span>
          </div>
        </template>
      </div>
    </section>
  </div>
</div>

<script>
const SAMPLE = {
  entry: 'welcome',
  nodes: [
    { id: 'welcome', type: 'play', media: 'sound:hello-world', next: 'menu' },
    { id: 'menu', type: 'play', media: 'sound:please-try-again', collectDigits: true, timeoutSec: 5, next: 'hangup' },
    { id: 'sales', type: 'enqueue', queue: 'sales', digit: '1' },
    { id: 'support', type: 'enqueue', queue: 'support', digit: '2' },
    { id: 'hangup', type: 'hangup' },
  ],
};

function panel() {
  return {
    tenantId: 'default',
    flows: [],
    versions: [],
    selected: null,
    editName: '',
    editDefault: false,
    graphJson: '',
    versionComment: '',
    err: null,
    msg: null,
    loaded: false,
    qs() { return `?tenant_id=${encodeURIComponent(this.tenantId)}`; },
    async init() {
      this.tenantId = new URLSearchParams(location.search).get('tenant_id') || 'default';
      if (!bo.token) bo.token = 'ivr-api-token';
      await this.load();
    },
    async load() {
      this.err = this.msg = null;
      try {
        this.flows = await bo.get(`/ivr/v1/flows${this.qs()}`);
        this.loaded = true;
        if (this.selected) {
          const fresh = this.flows.find(f => f.id === this.selected.id);
          if (fresh) this.select(fresh);
        }
      } catch (e) { this.err = e.message; }
    },
    select(f) {
      this.selected = f;
      this.editName = f.name;
      this.editDefault = !!f.isDefault;
      this.graphJson = JSON.stringify(f.graph || SAMPLE, null, 2);
      this.loadVersions();
    },
    async loadVersions() {
      if (!this.selected) return;
      try {
        this.versions = await bo.get(`/ivr/v1/flows/${this.selected.id}/versions${this.qs()}`);
      } catch (e) { this.versions = []; }
    },
    newFlow() {
      this.selected = { id: null, name: 'New flow', isDefault: false };
      this.editName = 'New flow';
      this.editDefault = false;
      this.graphJson = JSON.stringify(SAMPLE, null, 2);
      this.versions = [];
    },
    async saveMeta() {
      this.err = this.msg = null;
      try {
        if (!this.selected?.id) {
          const created = await bo.post(`/ivr/v1/flows${this.qs()}`, {
            name: this.editName,
            graph: JSON.parse(this.graphJson),
          });
          this.msg = 'Flow created';
          await this.load();
          this.select(this.flows.find(f => f.id === created.id) || created);
          return;
        }
        await bo.patch(`/ivr/v1/flows/${this.selected.id}${this.qs()}`, {
          name: this.editName,
          isDefault: this.editDefault,
        });
        this.msg = 'Metadata saved';
        await this.load();
      } catch (e) { this.err = e.message; }
    },
    async publish() {
      this.err = this.msg = null;
      let graph;
      try { graph = JSON.parse(this.graphJson); }
      catch { this.err = 'Invalid JSON'; return; }
      if (!this.selected?.id) {
        this.err = 'Save flow metadata first (creates flow)';
        return;
      }
      try {
        await bo.post(`/ivr/v1/flows/${this.selected.id}/versions${this.qs()}`, {
          graph,
          comment: this.versionComment || undefined,
          setActive: true,
        });
        this.msg = 'New version published';
        this.versionComment = '';
        await this.load();
        const fresh = this.flows.find(f => f.id === this.selected.id);
        if (fresh) this.select(fresh);
      } catch (e) { this.err = e.message; }
    },
    async activate(v) {
      this.err = this.msg = null;
      try {
        await bo.patch(`/ivr/v1/flows/${this.selected.id}${this.qs()}`, {
          activeVersionId: v.id,
        });
        this.msg = `Activated v${v.version}`;
        await this.load();
        this.select(this.flows.find(f => f.id === this.selected.id));
      } catch (e) { this.err = e.message; }
    },
  };
}
</script>
</body>
</html>
