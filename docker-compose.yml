name: blinkone

# ─── Shared proxy headers for all services ─────────────────────────────────
x-proxy-headers: &proxy-headers
  environment: &common-env
    NODE_ENV: production

services:

  # ═══════════════════════════════════════════════════════════════════════════
  # INFRASTRUCTURE
  # ═══════════════════════════════════════════════════════════════════════════

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB:       chatwoot
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [blinkone]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d chatwoot"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres_app:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB:       blinkone_app
      POSTGRES_USER:     app
      POSTGRES_PASSWORD: ${APP_DB_PASSWORD}
    volumes:
      - postgres_app_data:/var/lib/postgresql/data
    networks: [blinkone]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d blinkone_app"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks: [blinkone]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ═══════════════════════════════════════════════════════════════════════════
  # CHATWOOT (official image — BlinkOne branded via env)
  # ═══════════════════════════════════════════════════════════════════════════

  chatwoot:
    build:
      context: .
      dockerfile: docker/chatwoot-blinkone/Dockerfile
    image: ${CHATWOOT_IMAGE:-blinkone/chatwoot:v4.13.0-ce-b1}
    restart: unless-stopped
    env_file: .env
    environment:
      RAILS_ENV:              production
      INSTALLATION_ENV:       docker
      INSTALLATION_NAME:      ${INSTALLATION_NAME:-BlinkOne}
      INSTALLATION_EMAIL:     ${INSTALLATION_EMAIL:-admin@blinkone.ai}
      MAILER_SENDER_EMAIL:    ${MAILER_SENDER_EMAIL:-noreply@blinkone.ai}
      DISABLE_TELEMETRY:      ${DISABLE_TELEMETRY:-true}
      DATABASE_URL:           postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/chatwoot
      REDIS_URL:              redis://redis:6379
      SECRET_KEY_BASE:        ${SECRET_KEY_BASE}
      FRONTEND_URL:           ${FRONTEND_URL:-http://localhost}
      ENABLE_ACCOUNT_SIGNUP:  "false"
      ACTION_CABLE_ALLOWED_REQUEST_ORIGINS: ${FRONTEND_URL:-http://localhost},http://127.0.0.1
      # Shared secret the calls service signs broadcast posts with (X-Blinkone-Internal-Token).
      CHATWOOT_BOT_TOKEN: ${CHATWOOT_BOT_TOKEN:-}
      IVR_TOKEN:      ${IVR_TOKEN}
      SLA_TOKEN:      ${SLA_TOKEN}
      ESCALATION_TOKEN: ${ESCALATION_TOKEN}
      ROUTING_TOKEN:  ${ROUTING_TOKEN}
      CALLS_TOKEN:    ${CALLS_TOKEN}
      TENANT_SERVICE_URL: http://tenant:8802
      TENANT_TOKEN:   ${TENANT_TOKEN:-${PLATFORM_TOKEN}}
      AI_TOKEN:       ${AI_TOKEN}
      BILLING_TOKEN:  ${BILLING_TOKEN}
      INTEGRATION_TOKEN: ${INTEGRATION_TOKEN}
    entrypoint: docker/entrypoints/rails.sh
    command: ["bundle", "exec", "rails", "s", "-p", "3000", "-b", "0.0.0.0"]
    volumes:
      - chatwoot_storage:/app/storage
      - ./public/blinkone-brand:/app/public/blinkone-brand:ro
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    networks: [blinkone]
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  sidekiq:
    image: ${CHATWOOT_IMAGE:-blinkone/chatwoot:v4.13.0-ce-b1}
    restart: unless-stopped
    env_file: .env
    environment:
      RAILS_ENV:        production
      INSTALLATION_ENV: docker
      DATABASE_URL:     postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/chatwoot
      REDIS_URL:        redis://redis:6379
      SECRET_KEY_BASE:  ${SECRET_KEY_BASE}
      FRONTEND_URL:     ${FRONTEND_URL:-http://localhost}
    entrypoint: docker/entrypoints/rails.sh
    command: ["bundle", "exec", "sidekiq", "-C", "config/sidekiq.yml"]
    volumes:
      - chatwoot_storage:/app/storage
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    networks: [blinkone]

  # ═══════════════════════════════════════════════════════════════════════════
  # BLINKONE ENTERPRISE SERVICES
  # ═══════════════════════════════════════════════════════════════════════════

  gateway:
    build: { context: ., dockerfile: gateway/Dockerfile }
    restart: unless-stopped
    environment:
      PORT:                 "8787"
      JWT_SECRET:           ${JWT_SECRET}
      CHATWOOT_UPSTREAM:    http://chatwoot:3000
      PLATFORM_UPSTREAM:    http://platform:8790
      TICKETS_UPSTREAM:     http://tickets:8791
      CALLS_UPSTREAM:       http://calls:8792
      AI_UPSTREAM:          http://ai:8793
      BILLING_UPSTREAM:     http://billing:8794
      IVR_UPSTREAM:         http://ivr:8795
      SLA_UPSTREAM:         http://sla:8796
      ESCALATION_UPSTREAM:  http://escalation:8797
      ROUTING_UPSTREAM:     http://routing:8798
      RECORDING_UPSTREAM:   http://recording:8799
      INTEGRATION_UPSTREAM: http://integration:8800
      TENANT_UPSTREAM:      http://tenant:8802
      AI_TOKEN:             ${AI_TOKEN}
      BILLING_TOKEN:        ${BILLING_TOKEN}
      TENANT_TOKEN:         ${TENANT_TOKEN:-${PLATFORM_TOKEN}}
      PLATFORM_TOKEN:       ${PLATFORM_TOKEN}
      PLATFORM_ADMIN_EMAILS: ${PLATFORM_ADMIN_EMAILS:-admin@blinksone.com,admin@blinkone.ai,admin@labbik.om}
      CHATWOOT_WEBHOOK_SECRET: ${CHATWOOT_WEBHOOK_SECRET}
      TICKET_TOKEN:         ${TICKET_TOKEN}
      SLA_TOKEN:            ${SLA_TOKEN}
      ROUTING_TOKEN:        ${ROUTING_TOKEN}
      IVR_TOKEN:            ${IVR_TOKEN}
      IVR_DEFAULT_TENANT:   ${IVR_DEFAULT_TENANT:-1}
      ESCALATION_TOKEN:     ${ESCALATION_TOKEN}
      INTEGRATION_TOKEN:    ${INTEGRATION_TOKEN}
      CALLS_TOKEN:          ${CALLS_TOKEN}
      RECORDING_TOKEN:      ${RECORDING_TOKEN}
      WHATSAPP_CALLS_UPSTREAM: http://whatsapp-calls:8803
      WHATSAPP_CALLS_TOKEN: ${WHATSAPP_CALLS_TOKEN:-${CALLS_TOKEN}}
      CUSTOMER_CHATWOOT_TOKEN: ${CUSTOMER_CHATWOOT_TOKEN:-${CHATWOOT_API_ACCESS_TOKEN}}
      CUSTOMER_DEFAULT_ACCOUNT: ${CUSTOMER_DEFAULT_ACCOUNT:-1}
      DEVICE_STORE_PATH: /data/devices.json
      FCM_SERVER_KEY: ${FCM_SERVER_KEY:-}
    volumes:
      - gateway_data:/data
    networks: [blinkone]
    expose: ["8787"]
    ports:
      - "127.0.0.1:8787:8787"

  platform:
    build: { context: ./services, dockerfile: platform/Dockerfile }
    restart: unless-stopped
    environment:
      PORT:     "8790"
      DATA_DIR: /data
      TOKEN:    ${PLATFORM_TOKEN}
      JWT_SECRET: ${JWT_SECRET}
      PLATFORM_ADMIN_EMAILS: ${PLATFORM_ADMIN_EMAILS:-admin@blinksone.com,admin@blinkone.ai,admin@labbik.om}
      BLINKONE_BRANDING_CONFIG: /config/blinkone/branding.yml
      BLINKONE_BRAND_UPLOADS_DIR: /data/brand-uploads
    volumes:
      - platform_data:/data
      - brand_uploads:/data/brand-uploads
      - ./config/blinkone:/config/blinkone:ro
    networks: [blinkone]
    expose: ["8790"]

  tenant:
    build: { context: ./services, dockerfile: tenant/Dockerfile }
    restart: unless-stopped
    environment:
      PORT:                      "8802"
      TOKEN:                     ${TENANT_TOKEN:-${PLATFORM_TOKEN}}
      BLINKONE_DATABASE_URL:     postgresql://app:${APP_DB_PASSWORD}@postgres_app:5432/blinkone_app
      CHATWOOT_URL:              http://chatwoot:3000
      CHATWOOT_PLATFORM_TOKEN:   ${CHATWOOT_PLATFORM_TOKEN:-}
      FRONTEND_URL:              ${FRONTEND_URL:-http://localhost}
      SLA_URL:                   http://sla:8796
      ROUTING_URL:               http://routing:8798
      IVR_URL:                   http://ivr:8795
      SLA_TOKEN:                 ${SLA_TOKEN}
      ROUTING_TOKEN:             ${ROUTING_TOKEN}
      IVR_TOKEN:                 ${IVR_TOKEN}
      ACME_STUB:                 ${ACME_STUB:-1}
      BLINKONE_DOMAIN_SUFFIX:    ${BLINKONE_DOMAIN_SUFFIX:-blinkone.local}
      BILLING_URL:               http://billing:8794
      BILLING_TOKEN:             ${BILLING_TOKEN}
    depends_on:
      postgres_app: { condition: service_healthy }
    networks: [blinkone]
    expose: ["8802"]

  tickets:
    build: { context: ./services, dockerfile: tickets/Dockerfile }
    restart: unless-stopped
    environment:
      PORT:                  "8791"
      DATA_DIR:              /data
      TOKEN:                 ${TICKET_TOKEN}
      BLINKONE_DATABASE_URL: postgresql://app:${APP_DB_PASSWORD}@postgres_app:5432/blinkone_app
      SLA_URL:               http://sla:8796
      SLA_TOKEN:             ${SLA_TOKEN}
    volumes: [tickets_data:/data]
    depends_on:
      postgres_app: { condition: service_healthy }
    networks: [blinkone]
    expose: ["8791"]
    ports:
      - "127.0.0.1:8791:8791"

  calls:
    build: { context: ./services, dockerfile: calls/Dockerfile }
    restart: unless-stopped
    environment:
      PORT:                  "8792"
      DATA_DIR:              /data
      TOKEN:                 ${CALLS_TOKEN}
      BLINKONE_DATABASE_URL: postgresql://app:${APP_DB_PASSWORD}@postgres_app:5432/blinkone_app
      NOTIFY_RECORDING:      "1"
      RECORDING_URL:         http://recording:8799
      RECORDING_TOKEN:       ${RECORDING_TOKEN}
      CHATWOOT_URL:          http://chatwoot:3000
      CHATWOOT_BOT_TOKEN:    ${CHATWOOT_BOT_TOKEN:-}
      TENANT_URL:            http://tenant:8802
      TENANT_TOKEN:          ${TENANT_TOKEN:-${PLATFORM_TOKEN}}
      FEATURE_FAILOPEN:      ${FEATURE_FAILOPEN:-0}
      GATEWAY_URL:           http://gateway:8787
      PLATFORM_TOKEN:        ${PLATFORM_TOKEN}
      PUSH_CALLS_ENABLED:    ${PUSH_CALLS_ENABLED:-0}
    volumes: [calls_data:/data]
    depends_on:
      postgres_app: { condition: service_healthy }
    networks: [blinkone]
    expose: ["8792"]

  blinkone-minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-blinkone}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-blinkone-minio-secret}
    volumes:
      - minio_data:/data
    networks: [blinkone]
    ports:
      - '127.0.0.1:9000:9000'
      - '127.0.0.1:9001:9001'

  minio-init:
    image: minio/mc:latest
    depends_on:
      blinkone-minio: { condition: service_started }
    networks: [blinkone]
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://blinkone-minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing local/recordings;
      mc mb --ignore-existing local/blinkone-audio;
      mc mb --ignore-existing local/uploads;
      mc anonymous set download local/uploads;
      echo MinIO buckets ready;
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-blinkone}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-blinkone-minio-secret}
    restart: 'no'

  blinkone-whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest
    restart: unless-stopped
    environment:
      ASR_ENGINE: faster_whisper
      ASR_MODEL: ${WHISPER_MODEL:-small}
      ASR_MODEL_PATH: /models
    volumes:
      - whisper_models:/models
    networks: [blinkone]
    expose: ['9000']
    ports:
      - '127.0.0.1:8900:9000'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:9000/ || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s

  blinkone-piper:
    image: rhasspy/wyoming-piper:latest
    restart: unless-stopped
    command: >
      --voice ar_JO-kareem-medium
      --update-voices
    volumes:
      - piper_voices:/data
    networks: [blinkone]
    expose: ['5000', '10200']
    ports:
      - '127.0.0.1:5000:5000'
      - '127.0.0.1:10200:10200'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:5000/ || wget -qO- http://127.0.0.1:10200/ || exit 0']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s

  ai:
    build: { context: ./services, dockerfile: ai/Dockerfile }
    restart: unless-stopped
    environment:
      PORT:                      "8793"
      DATA_DIR:                  /data
      TOKEN:                     ${AI_TOKEN}
      BLINKONE_DATABASE_URL:     postgresql://app:${APP_DB_PASSWORD}@postgres_app:5432/blinkone_app
      OPENAI_API_KEY:            ${OPENAI_API_KEY}
      OPENAI_DEFAULT_MODEL:      ${OPENAI_DEFAULT_MODEL:-gpt-4o}
      OPENAI_FAST_MODEL:         ${OPENAI_FAST_MODEL:-gpt-4o-mini}
      STT_PROVIDER:              ${STT_PROVIDER:-whisper}
      WHISPER_STT_URL:           http://blinkone-whisper:9000
      WHISPER_STT_ENABLED:       ${WHISPER_STT_ENABLED:-1}
      WHISPER_MODEL:             ${WHISPER_MODEL:-small}
      WHISPER_FALLBACK_STUB:     ${WHISPER_FALLBACK_STUB:-1}
      STT_FALLBACK_STUB:         ${STT_FALLBACK_STUB:-1}
      GOOGLE_STT_STUB:           ${GOOGLE_STT_STUB:-1}
      GOOGLE_APPLICATION_CREDENTIALS: /secrets/google-stt.json
      GOOGLE_STT_PROJECT_ID:     ${GOOGLE_STT_PROJECT_ID:-}
      GOOGLE_STT_LOCATION:       ${GOOGLE_STT_LOCATION:-global}
      GOOGLE_STT_MODEL:          ${GOOGLE_STT_MODEL:-chirp_2}
      GOOGLE_STT_FALLBACK_STUB:  ${GOOGLE_STT_FALLBACK_STUB:-1}
      PIPER_TTS_URL:             http://blinkone-piper:5000
      PIPER_HOST:                blinkone-piper
      PIPER_PORT:                "10200"
      PIPER_STUB:                ${PIPER_STUB:-1}
      PIPER_FALLBACK_STUB:       ${PIPER_FALLBACK_STUB:-1}
      PIPER_DEFAULT_VOICE:       ${PIPER_DEFAULT_VOICE:-ar_JO-kareem-medium}
      VOICEBOT_LANGUAGE:         ${VOICEBOT_LANGUAGE:-ar-OM}
      MINIO_ENDPOINT:            blinkone-minio:9000
      MINIO_ACCESS_KEY:          ${MINIO_ROOT_USER:-blinkone}
      MINIO_SECRET_KEY:          ${MINIO_ROOT_PASSWORD:-blinkone-minio-secret}
      MINIO_STUB:                ${MINIO_STUB:-0}
      MINIO_BUCKET_AUDIO:        ${MINIO_BUCKET_AUDIO:-blinkone-audio}
      PII_REDACT_ENABLED:        "1"
      CHATWOOT_URL:              http://chatwoot:3000
      CHATWOOT_BOT_TOKEN:        ${CHATWOOT_BOT_TOKEN:-}
      TENANT_URL:                http://tenant:8802
      TENANT_TOKEN:              ${TENANT_TOKEN:-${PLATFORM_TOKEN}}
      FEATURE_FAILOPEN:          ${FEATURE_FAILOPEN:-1}
      BILLING_URL:               http://billing:8794
      BILLING_TOKEN:             ${BILLING_TOKEN}
    volumes:
      - ai_data:/data
      - ${GOOGLE_STT_KEY_PATH:-./secrets/google-stt.json}:/secrets/google-stt.json:ro
    depends_on:
      postgres_app: { condition: service_healthy }
      blinkone-piper: { condition: service_started }
      blinkone-whisper: { condition: service_started }
      blinkone-minio: { condition: service_started }
      minio-init: { condition: service_completed_successfully }
    networks: [blinkone]
    expose: ["8793"]

  billing:
    build: { context: ./services, dockerfile: billing/Dockerfile }
    restart: unless-stopped
    environment:
      PORT:                  "8794"
      DATA_DIR:              /data
      TOKEN:                 ${BILLING_TOKEN}
      BLINKONE_DATABASE_URL: postgresql://app:${APP_DB_PASSWORD}@postgres_app:5432/blinkone_app
      CURRENCY:              OMR
      DEFAULT_VAT_RATE:      "0.05"
      LABBIK_CR_NUMBER:      ${LABBIK_CR_NUMBER:-CR-XXXX}
      LABBIK_VAT_NUMBER:     ${LABBIK_VAT_NUMBER:-VAT-XXXX}
      PSP_WEBHOOK_SECRET:    ${PSP_WEBHOOK_SECRET:-}
      MINIO_STUB:            ${MINIO_STUB:-0}
      BILLING_WORKERS:       "1"
    volumes: [billing_data:/data]
    depends_on:
      postgres_app: { condition: service_healthy }
    networks: [blinkone]
    expose: ["8794"]

  ivr:
    build: { context: ./services, dockerfile: ivr/Dockerfile }
    restart: unless-stopped
    environment:
      PORT:                  "8795"
      DATA_DIR:              /data
      TOKEN:                 ${IVR_TOKEN}
      BLINKONE_DATABASE_URL: postgresql://app:${APP_DB_PASSWORD}@postgres_app:5432/blinkone_app
      IVR_DEFAULT_TENANT:    default
      IVR_PUBLIC_URL:        ${IVR_PUBLIC_URL:-https://app.blinksone.com/api/ivr}
      DIRECT_AGENT_DIAL:     ${DIRECT_AGENT_DIAL:-false}
      AGENT_SIP_URI:         ${AGENT_SIP_URI:-sip:blinkone@204.168.137.104:5060}
      AI_URL:                http://ai:8793
      AI_TOKEN:              ${AI_TOKEN}
      CALLS_URL:             http://calls:8792
      CALLS_TOKEN:           ${CALLS_TOKEN}
      VOICEBOT_LANGUAGE:     ${VOICEBOT_LANGUAGE:-ar-OM}
      ROUTING_URL:           http://routing:8798
      ROUTING_TOKEN:         ${ROUTING_TOKEN}
      ASTERISK_ARI_ENABLED:  "1"
      ASTERISK_ARI_URL:      http://blinkone-asterisk:8088
      ASTERISK_ARI_USER:     "${AST_ARI_USER:-blinkone}"
      ASTERISK_ARI_PASSWORD: "${AST_ARI_PASS:-blinkone-ari-secret}"
      ASTERISK_ARI_APP:      blinkone-ivr
      IVR_AGENT_DIAL_TEMPLATE: "PJSIP/${agentId}@agent-webrtc"
    volumes: [ivr_data:/data]
    depends_on:
      postgres_app: { condition: service_healthy }
    networks: [blinkone]
    expose: ["8795"]

  sla:
    build: { context: ./services, dockerfile: sla/Dockerfile }
    restart: unless-stopped
    environment:
      PORT:                  "8796"
      DATA_DIR:              /data
      TOKEN:                 ${SLA_TOKEN}
      TENANT_URL:            http://tenant:8802
      TENANT_TOKEN:          ${TENANT_TOKEN:-${PLATFORM_TOKEN}}
      BLINKONE_DATABASE_URL: postgresql://app:${APP_DB_PASSWORD}@postgres_app:5432/blinkone_app
      SLA_DEFAULT_TENANT:    default
      SLA_WORKER:            "1"
      ESCALATION_URL:        http://escalation:8797
      ESCALATION_TOKEN:      ${ESCALATION_TOKEN}
    volumes: [sla_data:/data]
    depends_on:
      postgres_app: { condition: service_healthy }
    networks: [blinkone]
    expose: ["8796"]
    ports:
      - '127.0.0.1:8796:8796'

  escalation:
    build: { context: ./services, dockerfile: escalation/Dockerfile }
    restart: unless-stopped
    environment:
      PORT:                      "8797"
      DATA_DIR:                  /data
      TOKEN:                     ${ESCALATION_TOKEN}
      BLINKONE_DATABASE_URL:     postgresql://app:${APP_DB_PASSWORD}@postgres_app:5432/blinkone_app
      ESCALATION_DEFAULT_TENANT: default
    volumes: [escalation_data:/data]
    depends_on:
      postgres_app: { condition: service_healthy }
    networks: [blinkone]
    expose: ["8797"]
    ports:
      - '127.0.0.1:8797:8797'

  routing:
    build: { context: ./services, dockerfile: routing/Dockerfile }
    restart: unless-stopped
    environment:
      TENANT_URL:              http://tenant:8802
      TENANT_TOKEN:            ${TENANT_TOKEN:-${PLATFORM_TOKEN}}
      PORT:                  "8798"
      DATA_DIR:              /data
      TOKEN:                 ${ROUTING_TOKEN}
      BLINKONE_DATABASE_URL: postgresql://app:${APP_DB_PASSWORD}@postgres_app:5432/blinkone_app
      REDIS_URL:             redis://redis:6379
      ROUTING_DEFAULT_TENANT: default
      CALLS_URL:             http://calls:8792
      CALLS_TOKEN:           ${CALLS_TOKEN}
      IVR_URL:               http://ivr:8795
      IVR_TOKEN:             ${IVR_TOKEN}
      ROUTING_QUEUE_WORKER:  "1"
      AST_WSS_URI:           ${AST_WSS_URI:-wss://sip.blinksone.com}
      AST_WSS_DOMAIN:        ${AST_WSS_DOMAIN:-blinkone.local}
      AST_AGENT_SIP_PASS:    ${AST_AGENT_SIP_PASS:-blinkone-agent-dev}
      STUN_SERVERS:          ${STUN_SERVERS:-stun:stun.l.google.com:19302}
      TURN_SERVER:           ${TURN_SERVER:-turn:coturn:3478}
      TURN_USER:             ${TURN_USER:-blinkone}
      TURN_PASS:             ${TURN_PASS:-blinkone-turn-secret}
    volumes: [routing_data:/data]
    depends_on:
      postgres_app: { condition: service_healthy }
      redis:        { condition: service_healthy }
    networks: [blinkone]
    expose: ["8798"]
    ports:
      - '127.0.0.1:8798:8798'

  coturn:
    image: coturn/coturn:4.6.2
    restart: unless-stopped
    volumes:
      - ./infra/coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
    command: ["-c", "/etc/coturn/turnserver.conf", "--no-cli"]
    networks: [blinkone]
    ports:
      - "3478:3478"
      - "3478:3478/udp"

  whatsapp-calls:
    build: { context: ./services, dockerfile: whatsapp-calls/Dockerfile }
    restart: unless-stopped
    environment:
      PORT:                      "8803"
      TOKEN:                     ${WHATSAPP_CALLS_TOKEN:-${CALLS_TOKEN}}
      WHATSAPP_CALLING_ENABLED:  ${WHATSAPP_CALLING_ENABLED:-0}
      META_VERIFY_TOKEN:         ${META_VERIFY_TOKEN:-blinkone-meta-verify}
    networks: [blinkone]
    expose: ["8803"]

  recording:
    build: { context: ./services, dockerfile: recording/Dockerfile }
    restart: unless-stopped
    environment:
      PORT:              "8799"
      DATA_DIR:          /data
      TOKEN:             ${RECORDING_TOKEN}
      STORAGE_BACKEND:   minio
      MINIO_ENDPOINT:         http://blinkone-minio:9000
      MINIO_PUBLIC_ENDPOINT:  ${MINIO_PUBLIC_ENDPOINT:-https://app.blinksone.com}
      MINIO_ACCESS_KEY:       ${MINIO_ROOT_USER:-blinkone}
      MINIO_SECRET_KEY:       ${MINIO_ROOT_PASSWORD:-blinkone-minio-secret}
      MINIO_BUCKET:           recordings
      MINIO_STUB:             ${MINIO_STUB:-0}
      AI_URL:                 http://ai:8793
      AI_TOKEN:               ${AI_TOKEN}
      AUTO_STT_ON_RECORDING:  ${AUTO_STT_ON_RECORDING:-0}
      STT_LANGUAGE_HINT:      ${STT_LANGUAGE_HINT:-ar-OM}
    volumes: [recording_data:/data]
    depends_on:
      blinkone-minio: { condition: service_started }
      minio-init: { condition: service_completed_successfully }
    networks: [blinkone]
    expose: ["8799"]

  integration:
    build: { context: ./services, dockerfile: integration/Dockerfile }
    restart: unless-stopped
    environment:
      PORT:                    "8800"
      DATA_DIR:                /data
      TOKEN:                   ${INTEGRATION_TOKEN}
      BLINKONE_DATABASE_URL:   postgresql://app:${APP_DB_PASSWORD}@postgres_app:5432/blinkone_app
      REDIS_URL:               redis://redis:6379
      BLINKONE_EVENT_STREAM:   blinkone:events
      CHATWOOT_WEBHOOK_SECRET: ${CHATWOOT_WEBHOOK_SECRET}
      KEYCLOAK_URL:            http://blinkone-keycloak:8080
      KEYCLOAK_STUB:           ${KEYCLOAK_STUB:-1}
      FRONTEND_URL:            ${FRONTEND_URL:-http://localhost}
      INTEGRATION_WORKERS:     "1"
    volumes: [integration_data:/data]
    depends_on:
      postgres_app: { condition: service_healthy }
      redis:        { condition: service_healthy }
    networks: [blinkone]
    expose: ["8800"]

  # ═══════════════════════════════════════════════════════════════════════════
  # ADMIN PANELS (static HTML served by nginx)
  # ═══════════════════════════════════════════════════════════════════════════

  admin-panels:
    image: nginx:1.27-alpine
    restart: unless-stopped
    volumes:
      - ./admin-panels:/usr/share/nginx/html:ro
    networks: [blinkone]
    expose: ["80"]

  # ═══════════════════════════════════════════════════════════════════════════
  # OBSERVABILITY — Prometheus + Grafana (Sprint 2 MON1)
  # ═══════════════════════════════════════════════════════════════════════════

  prometheus:
    image: prom/prometheus:v2.51.0
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks: [blinkone]
    ports: ["9090:9090"]

  grafana:
    image: grafana/grafana:10.4.2
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-blinkone}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/blinkone.json
    volumes:
      - ./infra/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./infra/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    networks: [blinkone]
    ports: ["3001:3000"]
    depends_on:
      prometheus: { condition: service_started }

  # ═══════════════════════════════════════════════════════════════════════════
  # PUBLIC ENTRY POINT
  # ═══════════════════════════════════════════════════════════════════════════

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports: ["80:80"]
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./public/blinkone-brand:/usr/share/nginx/blinkone-brand:ro
      - brand_uploads:/usr/share/nginx/brand-uploads:ro
    depends_on:
      chatwoot: { condition: service_started }
      gateway: { condition: service_started }
      admin-panels: { condition: service_started }
    networks: [blinkone]

  # ═══════════════════════════════════════════════════════════════════════════
  # ASTERISK 20 — SIP/WebRTC media server + ARI for IVR execution
  # ═══════════════════════════════════════════════════════════════════════════

  asterisk:
    build:
      context: ./infra/asterisk
      dockerfile: Dockerfile
    image: blinkone/asterisk:20
    container_name: blinkone-asterisk
    restart: unless-stopped
    environment:
      AST_EXTERNAL_IP:     "204.168.137.104"
      AST_LOCAL_NET:       "172.18.0.0/16"
      AST_ARI_USER:        "${AST_ARI_USER:-blinkone}"
      AST_ARI_PASS:        "${AST_ARI_PASS:-blinkone-ari-secret}"
      AST_AGENT_SIP_PASS:  "${AST_AGENT_SIP_PASS:-blinkone-agent-dev}"
      AST_TRUNK_SIP_PASS:  "${AST_TRUNK_SIP_PASS:-blinkone-trunk-dev}"
      AST_WSS_DOMAIN:      "${AST_WSS_DOMAIN:-sip.blinksone.com}"
      TWILIO_SIP_HOST:     "${TWILIO_SIP_HOST:-intelysys.pstn.twilio.com}"
      TWILIO_DID:          "${TWILIO_DID:-+96824000000}"
      ASTERISK_CERT_DIR:   /var/lib/asterisk/certs
    volumes:
      - asterisk_certs:/var/lib/asterisk/certs
      - asterisk_recordings:/var/spool/asterisk/recordings
    networks: [blinkone]
    expose:
      - "5060"
      - "8088"
    ports:
      - "10000-10100:10000-10100/udp"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8088/ari/applications -u blinkone:${AST_ARI_PASS:-blinkone-ari-secret} > /dev/null"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

networks:
  blinkone:
    driver: bridge

volumes:
  postgres_data:
  postgres_app_data:
  redis_data:
  chatwoot_storage:
  platform_data:
  tickets_data:
  calls_data:
  ai_data:
  billing_data:
  ivr_data:
  sla_data:
  escalation_data:
  routing_data:
  gateway_data:
  recording_data:
  integration_data:
  brand_uploads:
  piper_voices:
  whisper_models:
  minio_data:
  prometheus_data:
  grafana_data:
  asterisk_certs:
  asterisk_recordings: