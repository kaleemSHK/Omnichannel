worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events { worker_connections 1024; }

http {
  include      /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile     on;
  keepalive_timeout 65;
  client_max_body_size 50M;

  log_format main '$remote_addr [$time_local] "$request" $status $body_bytes_sent';
  access_log /var/log/nginx/access.log main;

  server {
    listen 80;
    server_name _;

    # ── Enterprise Admin Panels (/admin → embedded in Chatwoot sidebar) ─────
    location /admin {
      proxy_pass         http://admin-panels/;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── BlinkOne API (gateway → microservices) ────────────────────────────
    location /api/ {
      proxy_pass         http://gateway:8787/api/;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 120s;
    }

    # ── Chatwoot WebSocket (ActionCable) ─────────────────────────────────
    location /cable {
      proxy_pass         http://chatwoot:3000/cable;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_read_timeout 86400;
    }

    # ── Chatwoot (everything else — agent workspace, login, widget) ───────
    location / {
      proxy_pass         http://chatwoot:3000;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection $http_connection;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 300s;
    }
  }
}
