worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events { worker_connections 1024; }

http {
  include      /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile     on;
  keepalive_timeout 65;
  client_max_body_size 50M;
  # Docker embedded DNS — resolve upstreams at request time (avoids "host not found" on nginx start)
  resolver 127.0.0.11 valid=10s ipv6=off;
  # Chatwoot + BlinkOne use api_access_token; default nginx drops underscore headers
  underscores_in_headers on;

  log_format main '$remote_addr [$time_local] "$request" $status $body_bytes_sent';
  access_log /var/log/nginx/access.log main;

  server {
    listen 80;
    server_name _;

    # ── BlinkOne static brand assets ───────────────────────────────────────
    location /blinkone-brand/uploads/ {
      alias /usr/share/nginx/brand-uploads/;
      expires 1d;
    }

    location /blinkone-brand/ {
      alias /usr/share/nginx/blinkone-brand/;
      expires 7d;
      add_header Cache-Control "public, immutable";
    }

    # ── BlinkOne API (branding, future /blinkone/* routes) ─────────────────
    location /blinkone/ {
      set $blinkone_gateway gateway;
      proxy_pass         http://$blinkone_gateway:8787;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Legacy /admin static panels → Chatwoot (telephony admin lives in Settings)
    location /admin {
      return 302 /app/;
    }

    # ── BlinkOne API (gateway → microservices) ────────────────────────────
    location /api/ {
      set $blinkone_gateway gateway;
      proxy_pass         http://$blinkone_gateway:8787;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 120s;
    }

    # ── Asterisk WSS (JsSIP browser agents) ─────────────────────────────
    location /telephony/wss {
      set $asterisk_host blinkone-asterisk;
      proxy_pass         https://$asterisk_host:8089/ws;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host $host;
      proxy_read_timeout 86400;
      proxy_ssl_verify   off;
    }

    # ── Chatwoot WebSocket (ActionCable) ─────────────────────────────────
    location /cable {
      set $chatwoot_upstream chatwoot;
      proxy_pass         http://$chatwoot_upstream:3000;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_read_timeout 86400;
    }

    # Root — API entry (not a UI; Chatwoot UI is :3000, agent UI is :80)
    location = / {
      default_type application/json;
      return 200 '{"service":"blinkone-api","chatwoot":"http://127.0.0.1:3000/app","agent_ui":"http://127.0.0.1/login","api_prefix":"/api/"}';
    }

    # Chatwoot UI → host :3000 | Next.js agent UI → host :80
  }
}
