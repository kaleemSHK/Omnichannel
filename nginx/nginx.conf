worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events { worker_connections 1024; }

http {
  include      /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile     on;
  keepalive_timeout 65;
  client_max_body_size 50M;

  log_format main '$remote_addr [$time_local] "$request" $status $body_bytes_sent';
  access_log /var/log/nginx/access.log main;

  server {
    listen 80;
    server_name _;

    # ── BlinkOne static brand assets ───────────────────────────────────────
    location /blinkone-brand/uploads/ {
      alias /usr/share/nginx/brand-uploads/;
      expires 1d;
    }

    location /blinkone-brand/ {
      alias /usr/share/nginx/blinkone-brand/;
      expires 7d;
      add_header Cache-Control "public, immutable";
    }

    # ── BlinkOne API (branding, future /blinkone/* routes) ─────────────────
    location /blinkone/ {
      proxy_pass         http://gateway:8787/blinkone/;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Legacy /admin static panels → Chatwoot (telephony admin lives in Settings)
    location /admin {
      return 302 /app/;
    }

    # ── BlinkOne API (gateway → microservices) ────────────────────────────
    location /api/ {
      proxy_pass         http://gateway:8787/api/;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 120s;
    }

    # ── Asterisk WSS (JsSIP browser agents) ─────────────────────────────
    location /telephony/wss {
      proxy_pass         https://blinkone-asterisk:8089/ws;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host $host;
      proxy_read_timeout 86400;
      proxy_ssl_verify   off;
    }

    # ── Chatwoot WebSocket (ActionCable) ─────────────────────────────────
    location /cable {
      proxy_pass         http://chatwoot:3000/cable;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_read_timeout 86400;
    }

    # ── Chatwoot (everything else — agent workspace, login, widget) ───────
    location / {
      proxy_pass         http://chatwoot:3000;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection $http_connection;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 300s;
    }
  }
}
