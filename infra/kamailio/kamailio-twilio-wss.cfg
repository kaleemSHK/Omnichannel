#!KAMAILIO
# BlinkOne — browser WSS (JsSIP) ↔ UDP/TCP SIP ↔ Twilio Elastic SIP trunk
# Deploy to /etc/kamailio/kamailio.cfg on demo server (PROMPT_26)

#!define TWILIO_DID "+19143038893"
#!define TWILIO_DOMAIN "intelysys.pstn.twilio.com"

# Call-direction transaction flags. Set in request_route, read in onreply_route.
# Twilio signaling IPs rotate across a wide range, so reply source-IP matching is
# unreliable; these flags are the authoritative direction signal for media bridging.
#!define FLT_OUTBOUND 1
#!define FLT_INBOUND 2

####### Global Parameters #######
debug=2
log_stderror=no
# WebSocket TCP sockets must match the worker that accepted REGISTER
children=1
fork=yes
# Required for HTTP/WebSocket handshakes (no Content-Length)
tcp_accept_no_cl=yes

listen=udp:0.0.0.0:5060
listen=tcp:0.0.0.0:5060
# HTTP/WebSocket only on 8088 (xhttp); SIP stays on 5060
listen=tcp:0.0.0.0:8088

####### Modules #######
loadmodule "tm.so"
loadmodule "sl.so"
loadmodule "rr.so"
loadmodule "pv.so"
loadmodule "maxfwd.so"
loadmodule "usrloc.so"
loadmodule "registrar.so"
loadmodule "textops.so"
loadmodule "siputils.so"
loadmodule "xlog.so"
loadmodule "sanity.so"
loadmodule "xhttp.so"
loadmodule "websocket.so"
loadmodule "nathelper.so"
loadmodule "uac.so"
loadmodule "rtpengine.so"

####### Module params #######
modparam("rtpengine", "rtpengine_sock", "udp:127.0.0.1:22222")
modparam("rr", "enable_full_lr", 1)
modparam("uac", "auth_username_avp", "$avp(auser)")
modparam("uac", "auth_password_avp", "$avp(apass)")
modparam("uac", "auth_realm_avp", "$avp(arealm)")
modparam("usrloc", "db_mode", 0)
modparam("registrar", "max_expires", 3600)
modparam("registrar", "received_avp", "$avp(received)")
modparam("nathelper", "received_avp", "$avp(received)")
modparam("websocket", "keepalive_mechanism", 1)
modparam("websocket", "keepalive_timeout", 120)

####### Routing #######
request_route {
    $var(twilio_src) = 0;
    if (!mf_process_maxfwd_header("10")) {
        sl_send_reply("483", "Too Many Hops");
        exit;
    }

    if (!sanity_check("17895", "7")) {
        xlog("L_WARN", "Malformed SIP from $si:$sp\n");
        exit;
    }

    if (is_method("REGISTER")) {
        # Nginx terminates TLS → Kamailio sees WS on :8088; always store received= for lookup
        if ($Rp == 8088 || proto == WS || proto == WSS) {
            fix_nated_register();
        } else if (nat_uac_test("64")) {
            fix_nated_register();
        }
    } else if (nat_uac_test("64") && !is_method("ACK")) {
        fix_nated_contact();
    }

    if (is_method("OPTIONS")) {
        sl_send_reply("200", "OK");
        exit;
    }

    if (!is_method("REGISTER|MESSAGE")) {
        record_route();
    }

    if (is_method("REGISTER")) {
        if (!save("location")) {
            sl_reply_error();
        }
        exit;
    }

    # Twilio PSTN source IPs (shared with INVITE branch below)
    if ($si =~ "^54\\.172\\." || $si =~ "^54\\.244\\." || $si =~ "^54\\.171\\.127" || $si =~ "^35\\.156\\.191" || $si =~ "^54\\.65\\.63" || $si =~ "^54\\.169\\.127" || $si =~ "^54\\.252\\.254" || $si =~ "^177\\.71\\.206") {
        $var(twilio_src) = 1;
    }

    if (is_method("BYE|CANCEL")) {
        rtpengine_delete();
    }

    if (has_totag()) {
        if (loose_route()) {
            route(RTPENGINE);
            route(RELAY);
        } else {
            sl_send_reply("404", "Not here");
        }
        exit;
    }

    if (is_method("INVITE")) {
        xlog("L_INFO", "INVITE ru=$ru rd=$rd from $si:$sp\n");
        # Inbound to browser agent — either Twilio Elastic SIP Trunk origination
        # (matched by source IP → $var(twilio_src)) or Twilio Programmable Voice
        # <Dial><Sip>sip:blinkone@...> (matched by R-URI). Force the WebRTC media
        # bridging profile in route[RTPENGINE] for both.
        if ($var(twilio_src) == 1 || $rU == "blinkone") {
            $var(twilio_src) = 1;
            xlog("L_INFO", "INBOUND → agent blinkone (src=$si)\n");
            $rU = "blinkone";
            $ru = "sip:blinkone@sip.blinksone.com";
            if (!lookup("location")) {
                xlog("L_WARN", "INBOUND: blinkone not registered in usrloc\n");
                sl_send_reply("480", "Temporarily Unavailable");
                exit;
            }
            xlog("L_INFO", "INBOUND route ru=$ru ct=$ct\n");
            if ($ct =~ "transport=ws" || $rr =~ "transport=ws") {
                handle_ruri_alias();
            }
            setflag(FLT_INBOUND);
            t_on_reply("MANAGE_REPLY");
            route(RTPENGINE);
            route(RELAY);
            exit;
        }
        # Browser/WebRTC peer call — short numeric agent id (not PSTN).
        if ($rU =~ "^[0-9]{1,8}$") {
            if (!(proto == WS || proto == WSS || $Rp == 8088)) {
                xlog("L_WARN", "BLOCKED non-WS peer attempt from $si R-URI=$rU\n");
                sl_send_reply("403", "Forbidden");
                exit;
            }
            xlog("L_INFO", "PEER → agent $rU from $fu\n");
            if (!lookup("location")) {
                xlog("L_WARN", "PEER: agent $rU not registered\n");
                sl_send_reply("480", "Agent Unavailable");
                exit;
            }
            if ($ct =~ "transport=ws" || $rr =~ "transport=ws") {
                handle_ruri_alias();
            }
            setflag(FLT_OUTBOUND);
            t_on_reply("MANAGE_REPLY");
            route(RTPENGINE);
            route(RELAY);
            exit;
        }
        # Browser/WebRTC outbound — E.164 → Twilio trunk.
        # SECURITY: only browser (WebSocket) legs may reach the PSTN trunk. This
        # blocks open-relay toll fraud — UDP/TCP scanners hitting :5060 with a
        # numeric R-URI get 403 instead of a free outbound call.
        if ($rU =~ "^\\+[0-9]{10,15}$" || $rU =~ "^[0-9]{10,15}$") {
            if (!(proto == WS || proto == WSS || $Rp == 8088)) {
                xlog("L_WARN", "BLOCKED non-WS PSTN attempt from $si R-URI=$rU\n");
                sl_send_reply("403", "Forbidden");
                exit;
            }
            route(SET_TWILIO_CALLERID);
            $du = "sip:" + $rU + "@intelysys.pstn.twilio.com;transport=udp";
            xlog("L_INFO", "OUTBOUND PSTN du=$du From=$fu\n");
            setflag(FLT_OUTBOUND);
            t_on_failure("TRUNKAUTH");
            t_on_reply("MANAGE_REPLY");
            route(RTPENGINE);
            route(RELAY);
            exit;
        }
        if ($rd =~ "pstn\\.twilio\\.com") {
            if (!(proto == WS || proto == WSS || $Rp == 8088)) {
                xlog("L_WARN", "BLOCKED non-WS trunk attempt from $si\n");
                sl_send_reply("403", "Forbidden");
                exit;
            }
            route(SET_TWILIO_CALLERID);
            $du = "sip:" + $rU + "@" + $rd + ";transport=udp";
            setflag(FLT_OUTBOUND);
            t_on_failure("TRUNKAUTH");
            t_on_reply("MANAGE_REPLY");
            route(RTPENGINE);
            route(RELAY);
            exit;
        }
    }

    if (!lookup("location")) {
        sl_send_reply("404", "User Not Found");
        exit;
    }

    route(RTPENGINE);
    route(RELAY);
}

# Twilio 403 if From is not a purchased DID or verified Caller ID
route[SET_TWILIO_CALLERID] {
    remove_hf("From");
    append_hf("From: <sip:+19143038893@intelysys.pstn.twilio.com>\r\n");
    remove_hf("P-Preferred-Identity");
    remove_hf("P-Asserted-Identity");
    append_hf("P-Asserted-Identity: <sip:+19143038893@intelysys.pstn.twilio.com>\r\n");
}

route[RTPENGINE] {
    if (!has_body("application/sdp")) {
        return;
    }
    if ($var(twilio_src) == 1) {
        # Inbound: Twilio plain RTP/AVP INVITE → browser WebRTC (SAVPF + DTLS + ICE).
        # Keep PCMU — browsers support it natively, no transcoding needed.
        # rtcp-mux-offer/require: Chrome defaults rtcpMuxPolicy=require and rejects
        # any SDP without a=rtcp-mux ("Bad Media Description"), so force it here.
        rtpengine_manage("trust-address replace-origin replace-session-connection ICE=force RTP/SAVPF SDES-no DTLS=passive rtcp-mux-offer rtcp-mux-require");
    } else {
        # Outbound: browser WebRTC INVITE → Twilio plain RTP/AVP
        # Strip ICE/DTLS and offer PCMU; Twilio rejects SAVPF/DTLS with 488
        rtpengine_manage("trust-address replace-origin replace-session-connection ICE=remove RTP/AVP SDES-no DTLS=no");
    }
}

route[RELAY] {
    if (!t_relay()) {
        sl_reply_error();
    }
    exit;
}

onreply_route[MANAGE_REPLY] {
    if (!has_body("application/sdp")) {
        return;
    }
    # Direction comes from the transaction flag set in request_route, NOT the reply
    # source IP (Twilio's signaling IPs rotate and were misclassifying answers as
    # "from browser", stripping ICE/DTLS → Chrome "Bad Media Description").
    if (isflagset(FLT_OUTBOUND)) {
        # Outbound call: 18x/200 from Twilio (plain RTP/AVP) → WebRTC for the browser.
        # Force rtcp-mux (Chrome requires it) so the browser accepts the answer.
        rtpengine_manage("trust-address replace-origin replace-session-connection ICE=force RTP/SAVPF SDES-no DTLS=passive rtcp-mux-offer rtcp-mux-require");
    } else {
        # Inbound call: 18x/200 from browser (WebRTC) → plain RTP/AVP for Twilio.
        rtpengine_manage("trust-address replace-origin replace-session-connection ICE=remove RTP/AVP SDES-no DTLS=no");
    }
}

failure_route[TRUNKAUTH] {
    if (t_is_canceled()) {
        exit;
    }
    if (t_check_status("401|407")) {
        xlog("L_INFO", "Twilio auth challenge status=$rs — sending credentials\n");
        $avp(auser) = "blinkone";
        $avp(apass) = "BlinkSip2026!";
        uac_auth();
        route(RTPENGINE);
        route(RELAY);
        exit;
    }
    if (t_check_status("403")) {
        xlog("L_WARN", "Twilio 403 — fix Caller ID / geo permissions / trial limits\n");
    }
    xlog("L_WARN", "Twilio trunk failure status=$rs reason=$rr\n");
}

# WebSocket handshake (JsSIP subprotocol "sip")
event_route[xhttp:request] {
    if ($hdr(Upgrade) =~ "websocket") {
        if (ws_handle_handshake()) {
            exit;
        }
        xlog("L_ERR", "WebSocket handshake failed\n");
        xhttp_reply("400", "Bad Request", "", "");
        exit;
    }
    xhttp_reply("404", "Not Found", "", "");
}
