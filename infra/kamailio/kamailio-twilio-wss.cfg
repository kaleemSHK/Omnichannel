#!KAMAILIO
# BlinkOne — browser WSS (JsSIP) ↔ UDP/TCP SIP ↔ Twilio Elastic SIP trunk
# Deploy to /etc/kamailio/kamailio.cfg on demo server (PROMPT_26)

####### Global Parameters #######
debug=2
log_stderror=no
children=4
fork=yes

listen=udp:0.0.0.0:5060
listen=tcp:0.0.0.0:5060
# JsSIP WebSocket (nginx TLS /sip → this TCP port; Kamailio upgrades to WS)
listen=tcp:0.0.0.0:8088

####### Modules #######
loadmodule "tm.so"
loadmodule "sl.so"
loadmodule "rr.so"
loadmodule "pv.so"
loadmodule "maxfwd.so"
loadmodule "usrloc.so"
loadmodule "registrar.so"
loadmodule "textops.so"
loadmodule "siputils.so"
loadmodule "xlog.so"
loadmodule "sanity.so"
loadmodule "xhttp.so"
loadmodule "websocket.so"
loadmodule "nathelper.so"

####### Module params #######
modparam("usrloc", "db_mode", 0)
modparam("registrar", "max_expires", 3600)
modparam("registrar", "received_avp", "$avp(received)")
modparam("nathelper", "received_avp", "$avp(received)")
modparam("websocket", "keepalive_timeout", 30)

####### Routing #######
request_route {
    if (!mf_process_maxfwd_header("10")) {
        sl_send_reply("483", "Too Many Hops");
        exit;
    }

    if (!sanity_check("17895", "7")) {
        xlog("L_WARN", "Malformed SIP from $si:$sp\n");
        exit;
    }

    if (nat_uac_test("64")) {
        if (is_method("REGISTER")) {
            fix_nated_register();
        } else if (!is_method("ACK")) {
            fix_nated_contact();
        }
    }

    if (is_method("OPTIONS")) {
        sl_send_reply("200", "OK");
        exit;
    }

    if (!is_method("REGISTER|MESSAGE")) {
        record_route();
    }

    if (is_method("REGISTER")) {
        if (!save("location")) {
            sl_reply_error();
        }
        exit;
    }

    if (has_totag()) {
        if (loose_route()) {
            route(RELAY);
        } else {
            sl_send_reply("404", "Not here");
        }
        exit;
    }

    if (is_method("INVITE")) {
        if ($rU =~ "^[0-9+]+$" || $rd =~ "pstn\\.twilio\\.com") {
            if ($rd == "") {
                $rd = "intelysys.pstn.twilio.com";
            }
            $du = "sip:" + $rU + "@" + $rd + ";transport=udp";
            route(RELAY);
            exit;
        }
    }

    if (!lookup("location")) {
        sl_send_reply("404", "User Not Found");
        exit;
    }

    route(RELAY);
}

route[RELAY] {
    if (!t_relay()) {
        sl_reply_error();
    }
    exit;
}

onreply_route {
    if (nat_uac_test("64")) {
        fix_nated_contact();
    }
}

# WebSocket handshake (JsSIP → nginx /sip → tcp :8088)
event_route[xhttp:request] {
    if ($hdr(Upgrade) =~ "websocket") {
        if (ws_handle_handshake()) {
            exit;
        }
    }
    xhttp_reply("200", "OK", "", "");
}
